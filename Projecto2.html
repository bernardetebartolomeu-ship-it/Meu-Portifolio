<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Cadastro</title>
    <link rel="stylesheet" href="Projecto2.css">
</head>
<body>

   <form class="form-container">
    <h2>Kumana</h2>

      <div class="form-group">
       <label>Nome Completo</label>
       <input type="text" placeholder="Digite seu nome" required>
       </div>

       <div class="form-group">
        <label>Telefone</label>
        <input type="tel" required placeholder="84xxxxxxx">
       </div>

       <div class="form-group">
        <label>Senha</label>
        <input type="password" required placeholder="Digite a sua senha">
       </div>

       <div class="form-group">
        <label>Confirmar Senha</label>
        <input type="password" required>
       </div>

       <div class="radio-group">
        <strong>Tipo de conta:</strong><br><br>
        <label>
            <input type="radio" name="tipo" required>
                         Aprender ou Pedir ajuda
        </label>
        <label>
            <input type="radio" name="tipo">
                   Ensinar ou Oferecer servicos
        </label>
        </div>

        <button type="submit">Criar Conta</button>

       </div>
   </form
