<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kumana</title>
</head>
<body>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-image: url(BairroValor.avif);
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .header-card {
            position: absolute;
            top: 0;
            width: 100%;
            background-color: #0E6631;
            color: white;
            padding: 25px;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        
        #welcomeMessage {
            color: white;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 40px;
            min-height: 2.5em;
        }

        
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .buttons button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 140px;
        }

        .btn-login {
            background-color: #2ecc71;
            color: white;
        }

        .btn-login:hover {
            background-color: #27ae60;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .btn-register {
            background-color: #e0e0e0;
            color: #333;
        }

        .btn-register:hover {
            background-color: #cfcfcf;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            text-align: center;
            padding: 15px;
            font-size: 14px;
            color: #fff;
            background-color: rgba(0,0,0,0.3);
        }

        
        .typed-text {
            display: inline-block;
            border-right: 2px solid white;
            white-space: nowrap;
            overflow: hidden;
        }

    </style>

    <div class="header-card">
        Kumana
    </div>

    
    <h1 id="welcomeMessage" class="typed-text"></h1>

    <div class="buttons">
        <button class="btn-login" onclick="irParaLogin()">Entrar</button>
        <button class="btn-register" onclick="irParaCadastro()">Criar conta</button>
    </div>

    <footer>
        © 2026 - Kumana
    </footer>

    <script>
        function irParaLogin() {
            window.location.href = "TelaLogin.html";
        }

        function irParaCadastro() {
            window.location.href = "Tela2.html";
        }

        
        const message = "Bem-vindo ao Kumana!";
        const welcomeElement = document.getElementById("welcomeMessage");
        let i = 0;

        function typeWriter() {
            if (i < message.length) {
                welcomeElement.textContent += message.charAt(i);
                i++;
                setTimeout(typeWriter, 100); 
            }
        }

        setTimeout(typeWriter, 500); 
    </script>


</body>
</html>
