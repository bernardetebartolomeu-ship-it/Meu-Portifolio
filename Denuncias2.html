<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denúncias - SINAE-MZ</title>

<style>

/* ===== RESET ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

/* ===== CORPO ===== */
body{
    background-color:#e9e9e9;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* ===== CABEÇALHO ===== */
.header{
    background: #1A5276;
    color: white;
    padding: 15px;
    height: 15vh;
}

/* ===== BARRA SUPERIOR ===== */
.topbar{
    background-color:#2d8cc4;
    color:white;
    display:flex;
    align-items:center;
    padding:12px 20px;
    position:relative;
}

.topbar .voltar{
    font-size:22px;
    cursor:pointer;
}

.topbar h2{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    font-size:20px;
}

/* ===== CONTAINER ===== */
.container{
    flex:1;
    display:flex;
    justify-content:center;
    padding:40px;
}

/* ===== CAIXA DO FORMULÁRIO ===== */
.form-box{
    background-color:white;
    width:100%;
    max-width:800px;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.form-box h3{
    font-size:22px;
    margin-bottom:20px;
}

/* ===== LABEL ===== */
.label{
    display:block;
    margin-top:20px;
    margin-bottom:8px;
    font-weight:bold;
}

/* ===== CAMPOS ===== */
.campo{
    width:100%;
    padding:15px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:15px;
    background-color:#f5f5f5;
}

textarea.campo{
    min-height:120px;
    resize:none;
}

/* ===== BOTÃO ===== */
.botao-enviar{
    margin-top:25px;
    padding:12px 30px;
    background-color:#dcdcdc;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.botao-enviar:hover{
    background-color:#c5c5c5;
}

/* ===== RODAPÉ ===== */
.footer{
    background-color:#1f5678;
    color:white;
    text-align:center;
    padding:15px;
    font-size:14px;
}

</style>
</head>

<body>
<header class="header">
  SINAE-MZ
</header>

<div class="topbar">
  <span class="voltar">←</span>
  <h2>Denúncias</h2>
</div>

<div class="container">

  <div class="form-box">

    <h3>Nova denúncia</h3>

    <form>

      <label class="label">Tipo de Emergência</label>
      <select class="campo">
        <option>Saúde</option>
        <option>Polícia</option>
        <option>Incêndio</option>
        <option>Cheias</option>
        <option>Acidentes</option>
        <option>Tempestades</option>
        <option>Desastre Natural</option>
        <option>Segurança / Conflitos / Assaltos</option>
        <option>Outro</option>
      </select>

      <label class="label">Descrição</label>
      <textarea class="campo" placeholder="Descreva exatamente o problema..." required></textarea>

      <label class="label">Localização</label>
      <input type="text" class="campo" placeholder="Digite o local ou ative GPS" required>

      <label class="label">Adicionar imagem ou vídeo</label>
      <input type="file" class="campo">

      <button type="submit" class="botao-enviar">Enviar</button>

    </form>

  </div>

</div>

<footer class="footer">
  Sistema Nacional de Alerta de Emergências | 2026
</footer>

</body>
</html>
