<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kumana</title>
</head>
<body>

    <div class="app">

        <div class="header">Oferecer Servico</div>

        <form class="form">
            <h2>Publicar Servico</h2>

            <input type="text" required placeholder="O que voce ensina ou faz?">

            <textarea placeholder="Fale da sua experiencia" required></textarea>

            <input type="number" required placeholder="Preco por servico(MT)">

            <!--Upload de imagem-->
            <label class="image-upload">
                📷 Adicionar imagem do servico
                <input type="file" accept="image" onchange="previewImage(event)">
                <img id="preview">
            </label>

            <button type="submit">Publicar Servico</button>
        </form>
        <a href="Tela3.html" class="voltar-btn">Voltar</a>


        <footer>&copy 2026 - Kumana</footer>
    </div>
</body>
</html>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: arial, sans-serif;
        background: #f4f6f5;
        color: #333;
    }

    .app {
        max-width: 1200px;
        margin: auto;
        min-height: 100vh;
        background: #ffffff;
        display: flex;
        flex-direction: column;
    }

    .header {
        background:#2f7d5c;
        color: white;
        padding: 18px;
        font-size: 18px;
        text-align: center;
    }

    .form {
        max-width: 600px;
        flex-wrap: wrap;
        margin: auto;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    .form h2 {
        text-align: center;
        color: #2f7d5c;
    }

    textarea, input, button {
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 15px;
        width: 100%;
    }

    textarea {
        min-height: 120px;
    }

    .image-upload {
        border: 2px dashed #bbb;
        padding: 20px;
        text-align: center;
        border-radius: 12px;
        cursor: pointer;
        background: #fafafa;
    }

    .image-upload img {
        max-width: 100%;
        border-radius: 12px;
        margin-top: 10px;
    }

    button {
        background: #2f7d5c;
        color: white;
        font-weight: bold;
        border: none;
        cursor: pointer;
    }

    footer {
        text-align: center;
        padding: 15px;
        color: #777;
        margin-top: auto;
    }

    .voltar-btn{
    display:inline-block;
    text-decoration:none;
    background: #00796B;
    color: #fff;
    font-weight:600;
    padding:14px;
    border-radius:12px;
    margin-top:25px;
    transition: all 0.3s ease;
    text-align:center;
}

.voltar-btn:hover{
    background:#004D40;
    transform:translateY(-3px);
}

    
</style>
