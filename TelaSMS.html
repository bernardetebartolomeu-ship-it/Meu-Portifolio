<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensagem</title>
</head>
<body>
    
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background-image: url(bern.jpg);
    min-height:100vh;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:16px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.header a{
    text-decoration:none;
    color:#007bff;
    font-weight:bold;
}

.card{
    background:#fff;
    border-radius:12px;
    padding:16px;
    margin-bottom:12px;
    cursor:pointer;
}

.card:hover{
    background:#f1f1f1;
}

.mensagem-nome{
    font-weight:bold;
}

.mensagem-preview{
    color:#555;
    font-size:0.9rem;
}

footer{
    text-align:center;
    margin-top:30px;
    color:#555;
}
</style>
</head>

<body>
<div class="container">

<header class="header">
    <h1>Mensagens</h1>
    <a href="Tela3.html">Voltar</a>
</header>

<div class="card">
    <p class="mensagem-nome">Maria Silva</p>
    <p class="mensagem-preview">Olá João, podes ajudar-me?</p>
</div>

<div class="card">
    <p class="mensagem-nome">Carlos M.</p>
    <p class="mensagem-preview">Obrigado pela ajuda 🙏</p>
</div>

<div class="card">
    <p class="mensagem-nome">Comunidade Kumana</p>
    <p class="mensagem-preview">Bem-vindo à plataforma!</p>
</div>

<footer>&copy; 2026 - Kumana</footer>
</div>

    
</body>
</html>
