<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kumana</title>

    <Style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: arial, sans-serif;
            background: #f4f6f5;
            color: #333;
        }

        .app {
            max-width: 1200px;
            margin: auto;
            min-height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #2f7d5c;
            color: white;
            padding: 18px;
            font-size: 18px;
        }

        .conteudo {
            flex: 1;
            padding: 30px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        .conteudo p {
            font-size: 18px;
        }

        button {
            max-width: 280px;
            margin: auto;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: #2f7d5c;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 15px;
            color: #777;
        }
    </Style>
</head>
<body>
    <div class="app">

        <div class="header">🎓Aprender Algo</div>

        <div class="conteudo">
            <p>Veja servicos disponiveis na sua comunidade.</p>

            <button 
            onclick="window.location.href='professores.html'">
                Ver Professores
            </button>
        </div>

        <footer>&copy 2026 - Kumana</footer>
    </div>
    
</body>
</html>
