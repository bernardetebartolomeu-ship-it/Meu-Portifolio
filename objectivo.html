<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objectivos</title>
</head>
<body>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f4f4f4; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            min-height: 100vh;
        }

        
        .container {
            width: 100%;
            max-width: 600px; 
            background: #4A9DB0;
            border-radius: 25px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1s ease forwards;
        }

        h2 {
            color: #0E6631;
            text-align: center;
            font-size: 2rem;
            margin-bottom: 25px;
            animation: slideIn 1s ease forwards;
        }

        ul {
            list-style: none;
            width: 100%;
        }

        li {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #333;
            margin-bottom: 15px;
            opacity: 0;
            transform: translateY(20px);
            animation: textFade 1s ease forwards;
            display: flex;
            align-items: flex-start;
        }

        
        li::before {
            content: "•";
            color: #0E6631;
            font-weight: bold;
            margin-right: 10px;
            font-size: 1.5rem;
            line-height: 1;
        }

        
        li:nth-child(1) { animation-delay: 0.3s; }
        li:nth-child(2) { animation-delay: 0.6s; }
        li:nth-child(3) { animation-delay: 0.9s; }
        li:nth-child(4) { animation-delay: 1.2s; }
        li:nth-child(5) { animation-delay: 1.5s; }

        
        .voltar-btn {
            display: inline-block;
            text-decoration: none;
            background: #0E6631;
            color: #fff;
            font-weight: 600;
            padding: 14px 40px;
            border-radius: 12px;
            margin-top: 25px;
            transition: all 0.3s ease;
            animation: fadeInBtn 1s ease forwards;
        }

        .voltar-btn:hover {
            transform: translateY(-5px) scale(1.05);
            background: #0a321a;
        }

        footer {
            margin-top: 25px;
            text-align: center;
            font-size: 0.9rem;
            color: #555;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px);}
            to { opacity: 1; transform: translateY(0);}
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes textFade {
            to { opacity: 1; transform: translateY(0);}
        }

        @keyframes fadeInBtn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
            }
            h2 {
                font-size: 1.6rem;
            }
            li {
                font-size: 1rem;
            }
            .voltar-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>


    <main class="container">
        <section id="objectivos">
            <h2>Objectivos</h2>
            
            <ul>
                <li>Organizar atividades e informações da comunidade</li>
                <li>Facilitar o crescimento pessoal dos moradores</li>
                <li>Promover inclusão digital e aprendizado</li>
                <li>Apoiar comunidades, jovens e famílias</li>
                <li>Oferecer tecnologia simples, prática e funcional</li>
            </ul>

        </section>
        
        <a href="Tela3.html" class="voltar-btn">Voltar</a>
        
        <footer>&copy; 2026 - Kumana</footer>
    </main>
    
</body>
</html>
