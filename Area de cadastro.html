<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denúncias - SINAE-MZ</title>

<style>
 */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background-color:#e9e9e9;
    display:flex;
    flex-direction:column;
    min-height:100vh;
    font-family: Arial, Helvetica, sans-serif;
}

.header{
    background-color:#1f5678;
    color:white;
    padding:25px 40px;
    font-size:26px;
    font-weight:bold;
}


.topbar{
    background-color:#2d8cc4;
    color:white;
    display:flex;
    align-items:center;
    padding:12px 20px;
    position:relative;
}

.topbar .voltar{
    font-size:22px;
    cursor:pointer;
}

.topbar h2{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    font-size:20px;
}

.container{
    flex:1;
    display:flex;
    justify-content:center;
    padding:40px;
}

.form-box{
    background-color:white;
    width:100%;
    max-width:800px;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.form-box h3{
    font-size:22px;
    margin-bottom:20px;
}

.label{
    display:block;
    margin-top:20px;
    margin-bottom:8px;
    font-weight:bold;
}

.campo{
    width:100%;
    padding:15px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:15px;
    background-color:#f5f5f5;
}

textarea.campo{
    min-height:120px;
    resize:none;
}

.botao-enviar{
    margin-top:25px;
    padding:12px 30px;
    background-color:#dcdcdc;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.botao-enviar2{
    margin-top:25px;
    padding:12px 30px;
    background-color:#1ea5fe;
    color: white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.botao-enviar:hover{
    background-color:#c5c5c5;
}

a {
    text-decoration: none;
}

.footer{
    background-color:#1f5678;
    color:white;
    text-align:center;
    padding:15px;
    font-size:14px;
}

</style>
</head>

<body>
<header class="header">
  SINAE-MZ
</header>

<div class="topbar">
  <span class="voltar">←</span>
  <h2>Area de Cadastro</h2>
</div>

<div class="container">

  <div class="form-box">

    <h3>Cadastro</h3>


      <label class="label">Nome</label>
      <input type="text" class="campo" placeholder="Digite o seu nome aqui..." required>

      <label class="label">Email</label>
      <input type="email" class="campo" placeholder="Digite o seu email aqui..." required>

      <label class="label">Numero de telefone</label>
      <input type="tel" class="campo" placeholder="Digite o seu numero aqui..." required>

      <label class="label">Senha</label>
      <input type="password" class="campo" placeholder="Digite a sua senha aqui...">

      <label class="label">Confirmar Senha</label>
      <input type="password" class="campo" placeholder="Confirme a sua senha aqui...">

      <button type="submit" class="botao-enviar2">Enviar</button><br>
      <button type="submit" class="botao-enviar2"><a href="pagina inicial.html">Simulacao de entrada</a></button>

    </form>

  </div>

</div>

<footer class="footer">
  Sistema Nacional de Alerta de Emergências | 2026
</footer>

</body>
</html>
