<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kumana</title>
</head>
<body>

    <main class="login-container">
        <div class="card">
            <div class="header-green">
                <h1>Kumana</h1>
            </div>

            <div class="content">
                <p class="tagline">O que acontece no seu bairro importa</p>
                
                <div class="icon-box">
                    <img src="maos.webp" alt="Aperto de mãos">
                </div>

                <form id="loginForm">
                    <input type="text" id="email" placeholder="Email" required>
                    <input type="password" id="password" placeholder="Insira a senha"  required>
                    
                    <p id="error-message" style="color: red; font-size: 0.8rem; margin-bottom: 10px; display: none;"></p>
                    
                    <button type="submit" class="btn-entrar">Entrar</button>
                </form>

                <p class="signup-text">
                    Não tem conta? <a href="Tela2.html">Criar conta</a>
                </p>
            </div>
        </div>
    </main>

    <style>
        :root {
    --verde-kumana: #1a6935;
    --cinza-fundo: #f0f2f5;
    --branco: #ffffff;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: sans-serif;
}

body {
    background-color: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 15px;
}

.card {
    background-color: var(--cinza-fundo);
    width: 100%;
    max-width: 380px;
    height: 650px; 
    border-radius: 40px;
    border: 1px solid #bbb;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.header-green {
    background-color: var(--verde-kumana);
    padding: 50px 20px;
    text-align: center;
}

.header-green h1 {
    color: var(--branco);
    font-size: 2.2rem;
}

.content {
    flex: 1; 
    padding: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.tagline {
    font-weight: bold;
    color: #666;
    margin-bottom: 20px;
}

.icon-box img {
    width: 90px;
    margin-bottom: 30px;
}

input {
    width: 100%;
    padding: 15px;
    margin-bottom: 12px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 1rem;
}

.btn-entrar {
    width: 100%;
    background-color: var(--verde-kumana);
    color: var(--branco);
    border: none;
    padding: 15px;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
}

.signup-text {
    margin-top: auto;
    padding-bottom: 10px;
    font-size: 0.9rem;
}

.signup-text a {
    color: #007bff;
    text-decoration: none;
    font-weight: bold;
}
    </style>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
    event.preventDefault(); 

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorMessage = document.getElementById('error-message');

    errorMessage.style.display = 'none';
    errorMessage.textContent = '';

   
    if (!email.includes('@') || !email.includes('.')) {
        errorMessage.textContent = 'O email deve conter "@" e "."';
        errorMessage.style.display = 'block';
        return;
    }

    if (password.length > 6) {
        errorMessage.textContent = 'A senha deve ter no máximo 6 caracteres.';
        errorMessage.style.display = 'block';
        return;
    }


    window.location.href = "tela3.html";
});
    </script>

    
</body>
</html>
